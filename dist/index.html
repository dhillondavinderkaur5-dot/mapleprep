    <style>
      body { font-family: 'Inter', sans-serif; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .font-hand { font-family: 'Patrick Hand', cursive; }
      .font-serif-theme { font-family: 'Lora', serif; }
      .font-mono-theme { font-family: 'Roboto Mono', monospace; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideLeft { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes slideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
      .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
      .animate-slideUp { animation: slideUp 0.4s ease-out forwards; }
      .animate-slideLeft { animation: slideLeft 0.3s ease-out forwards; }
      .animate-slideRight { animation: slideRight 0.3s ease-out forwards; }
      .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
      .animate-bounce-subtle { animation: bounce-subtle 2s infinite; }
      @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

      /* Robust Fullscreen Layouts */
      :fullscreen {
        background-color: #0f172a !important;
        color: white !important;
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: stretch !important;
        justify-content: space-between !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
      }

      :fullscreen .fullscreen-hide {
        display: none !important;
      }

      /* Massive Tool Display */
      :fullscreen .massive-tool-text {
        font-family: 'Roboto Mono', monospace !important;
        font-size: min(25vh, 20vw) !important;
        line-height: 1 !important;
        letter-spacing: -0.05em !important;
        text-align: center !important;
        width: auto !important;
        max-width: 95vw !important;
        padding: 4vh 6vh !important;
        background: rgba(255, 255, 255, 0.02) !important;
        border: 2px solid rgba(255, 255, 255, 0.05) !important;
        border-radius: 5vh !important;
        margin-bottom: 5vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        white-space: nowrap !important;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5) !important;
      }

      :fullscreen .timer-red { color: #f43f5e !important; }
      :fullscreen .sw-blue { color: #38bdf8 !important; }

      /* Fullscreen Setting Controls for Timer */
      :fullscreen .timer-setter-grid {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 4vh !important;
        margin-bottom: 6vh !important;
        width: 80vw !important;
        max-width: 900px !important;
      }

      :fullscreen .setter-col {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 2vh !important;
      }

      :fullscreen .setter-val {
        font-size: 12vh !important;
        font-weight: 900 !important;
        font-family: 'Roboto Mono', monospace !important;
        color: white !important;
        background: rgba(255,255,255,0.05) !important;
        width: 100% !important;
        text-align: center !important;
        border-radius: 2vh !important;
        padding: 1vh 0 !important;
      }

      :fullscreen .setter-btn {
        width: 100% !important;
        padding: 2vh !important;
        background: rgba(255,255,255,0.1) !important;
        border-radius: 1.5vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        transition: all 0.2s !important;
      }

      :fullscreen .setter-btn:hover {
        background: rgba(255,255,255,0.2) !important;
        transform: scale(1.05) !important;
      }

      :fullscreen .setter-label {
        font-size: 2vh !important;
        text-transform: uppercase !important;
        letter-spacing: 0.2em !important;
        color: #94a3b8 !important;
        font-weight: 900 !important;
      }

      /* Navigation/Exit buttons in fullscreen */
      :fullscreen .fullscreen-controls {
        display: flex !important;
        gap: 3vh !important;
      }

      :fullscreen .fullscreen-controls button {
        padding: 3vh 6vh !important;
        font-size: 3.5vh !important;
        border-radius: 2.5vh !important;
        font-weight: 900 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
      }

      :fullscreen .fs-start-btn {
        background: #f43f5e !important;
        color: white !important;
        width: 40vw !important;
        max-width: 500px !important;
      }

      /* Exit Fullscreen Button Positioning */
      :fullscreen button[title*="Fullscreen"] {
        position: fixed !important;
        top: 3vh !important;
        right: 3vh !important;
        background: rgba(255,255,255,0.05) !important;
        padding: 1.5vh !important;
        border-radius: 1.5vh !important;
        z-index: 100 !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
      }

      /* Robust Print Styling for Worksheets */
      @media print {
        header, nav, aside, footer, button, .print-hide, #version-tag {
          display: none !important;
        }
        body { background: white !important; margin: 0 !important; padding: 0 !important; }
        #root { padding: 0 !important; margin: 0 !important; display: block !important; }
        #printable-worksheet {
          display: block !important;
          position: relative !important;
          visibility: visible !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          border: none !important;
          box-shadow: none !important;
          background: white !important;
          z-index: 1 !important;
        }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        h1, h2, h3 { page-break-after: avoid; }
        .printable-content div { page-break-inside: avoid; }
      }
    </style>
